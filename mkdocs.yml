site_name: BirdNET-STM32
site_description: Bird sound classification for edge deployment on STM32N6570-DK with NPU
site_url: https://birdnet-team.github.io/birdnet-stm32
repo_url: https://github.com/birdnet-team/birdnet-stm32
repo_name: birdnet-team/birdnet-stm32

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: getting-started.md
      - Dataset Preparation: dataset.md
      - Training: training.md
      - Model Conversion: conversion.md
      - Evaluation: evaluation.md
      - Deployment: deployment.md
  - Developer Guide:
      - Architecture: dev/architecture.md
      - Audio Frontends: dev/audio-frontends.md
      - Model: dev/model.md
      - Quantization: dev/quantization.md
      - Testing: dev/testing.md
      - Contributing: dev/contributing.md
  - API Reference: reference/
